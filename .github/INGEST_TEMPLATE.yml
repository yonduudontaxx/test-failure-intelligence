# ─────────────────────────────────────────────────────────────────────────────
# Test Failure Intelligence — CI Ingestion Template
# ─────────────────────────────────────────────────────────────────────────────
#
# This file is a REFERENCE template, not an active workflow. To use it,
# copy the relevant block into your project's .github/workflows/<name>.yml.
#
# Required GitHub Actions variables
# (Settings → Secrets and variables → Actions → Variables):
#
#   TFI_API_URL       — base URL of the backend (e.g. https://tfi.example.com)
#   TFI_DASHBOARD_URL — base URL of the dashboard (e.g. https://tfi-dashboard.example.com)
#   TFI_PROJECT_ID    — UUID of the project in TFI (visible in the projects list)
#
# Required job permissions for the PR comment step:
#   permissions:
#     contents: read           # default for checkout
#     pull-requests: write     # required so the comment step can post on PRs
#
#   Without `pull-requests: write` the github-script step fails with a 403
#   on pull_request events. Push events skip the comment step entirely.
#
# Ingestion endpoint:
#   POST $TFI_API_URL/api/v1/projects/$TFI_PROJECT_ID/ingest
#
# Dashboard deep link:
#   The ingest response includes { "data": { "runId": "...", "testCaseCount": N } }.
#   We parse runId with jq (pre-installed on GitHub-hosted ubuntu-latest
#   runners — no install step required) and surface the link two ways:
#     1. GitHub Actions job summary    — at the top of the workflow run page
#     2. PR comment (pull_request only) — into the conversation, so the PR
#                                          author gets a notification
#   The link points at:
#     $TFI_DASHBOARD_URL/projects/$TFI_PROJECT_ID/runs/<runId>
#
# Supported formats:
#   - jest         Jest JSON          (multipart, format=jest)
#   - playwright   Playwright JSON    (multipart, format=playwright)
#   - junit-xml    JUnit XML          (multipart, format=junit-xml)
#   - json         Generic canonical  (multipart, format=json — file upload)
#   - api          Canonical JSON     (application/json body — inline JSON)
#
# Override fields available on every ingestion (all optional):
#   branch, commitSha, environment, pipelineName, buildNumber, externalId
#
# The multipart paths accept overrides as form fields (`-F branch=…`).
# The application/json path expects overrides inside the body's testRun
# object — overrides are not honored as separate fields on that path.
#
# Why `if: always()`?
#   GitHub Actions skips remaining steps when one fails. The ingest step
#   must run even when tests fail — failure is precisely when we want the
#   data in TFI. `if: always()` opts out of the default success() condition.
#   The job's final status still reflects the test outcome; this only
#   ensures ingestion happens regardless.
#
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      # ── Run your tests ──────────────────────────────────────────────────
      # Jest example — produces jest-results.json
      - name: Run tests
        run: npx jest --json --outputFile=jest-results.json

      # ── Ingest into TFI ─────────────────────────────────────────────────
      # if: always() — see header for why this matters.
      # Captures the response, parses runId with jq, exports it to
      # $GITHUB_ENV for the comment step, and writes a dashboard deep-link
      # to the GitHub Actions job summary.
      - name: Ingest test results
        if: always()
        run: |
          response=$(curl --fail-with-body -sS -X POST \
            "${{ vars.TFI_API_URL }}/api/v1/projects/${{ vars.TFI_PROJECT_ID }}/ingest" \
            -F "file=@jest-results.json" \
            -F "format=jest" \
            -F "branch=${{ github.ref_name }}" \
            -F "commitSha=${{ github.sha }}" \
            -F "environment=ci" \
            -F "pipelineName=${{ github.workflow }}" \
            -F "buildNumber=${{ github.run_number }}" \
            -F "externalId=${{ github.run_id }}")
          run_id=$(echo "$response" | jq -r '.data.runId')
          echo "TFI_RUN_ID=${run_id}" >> $GITHUB_ENV
          url="${{ vars.TFI_DASHBOARD_URL }}/projects/${{ vars.TFI_PROJECT_ID }}/runs/${run_id}"
          {
            echo "### Test Failure Intelligence"
            echo ""
            echo "[View run dashboard]($url)"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Comment dashboard link on PR ────────────────────────────────────
      # Only runs on pull_request events. The previous step exported
      # TFI_RUN_ID to $GITHUB_ENV so this step can read it.
      - name: Comment dashboard link on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v5
        env:
          TFI_DASHBOARD_URL: ${{ vars.TFI_DASHBOARD_URL }}
          TFI_PROJECT_ID: ${{ vars.TFI_PROJECT_ID }}
          RUN_ID: ${{ env.TFI_RUN_ID }}
        with:
          script: |
            const url = `${process.env.TFI_DASHBOARD_URL}/projects/${process.env.TFI_PROJECT_ID}/runs/${process.env.RUN_ID}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🧪 Test Failure Intelligence\n\n[View run dashboard](${url})\n\nResults ingested automatically. Click the link to see test cases, failure patterns, and reliability data.`,
            });

