services:
  postgres:
    image: postgres:16-alpine
    container_name: tfi-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: tfi_dev
      POSTGRES_USER: tfi
      POSTGRES_PASSWORD: tfi_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tfi -d tfi_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile.dev
    container_name: tfi-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://tfi:tfi_dev_password@postgres:5432/tfi_dev
      LOG_LEVEL: debug
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile.dev
    container_name: tfi-frontend-dev
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_dev_data:
